<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dragonbane">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <title>Dragonbane - Creador de Mapas de Batalla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1a1a1a;
            --sidebar-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #d4af37;
            --grid-color: rgba(0, 0, 0, 0.15);
            --cell-size: 80px;
            --grid-cols: 20;
            --grid-rows: 15;
            --grid-dot-color: rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'MedievalSharp', cursive;
            background-color: var(--primary-bg);
            background-image: url('wood.png');
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Prevent accidental browser gestures */
        }

        /* Sidebar */
        aside {
            width: 300px;
            background-color: rgba(45, 45, 45, 0.95);
            border-right: 3px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            background: linear-gradient(to bottom, #3d3d3d, #2d2d2d);
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--accent-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .search-container {
            padding: 0 10px;
        }

        #token-search {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--accent-color);
            border-radius: 20px;
            padding: 8px 15px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        #token-search:focus {
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .drawing-tools {
            padding: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(0,0,0,0.2);
        }

        .tool-btn {
            background: #444;
            border: 1px solid #666;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .tool-btn.active {
            background: var(--accent-color);
            color: black;
            border-color: #fff;
        }

        .sidebar-footer {
            padding: 15px;
            border-top: 2px solid var(--accent-color);
            background: #222;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .map-selector {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .map-selector label {
            font-size: 0.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        .map-selector select {
            background: #333;
            color: white;
            border: 1px solid var(--accent-color);
            padding: 5px;
            font-family: inherit;
            border-radius: 4px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .category {
            margin-bottom: 15px;
        }

        .category-title {
            background: #3d3d3d;
            padding: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 5px;
            border-left: 5px solid var(--accent-color);
            margin-bottom: 5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .category-title:hover {
            background: #4d4d4d;
            border-left-width: 10px;
        }

        .category-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 0 0 5px 5px;
        }

        .category.collapsed .category-items {
            display: none;
        }

        /* Tokens */
        .token {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem; /* Larger emoji */
            cursor: grab;
            background: #f0e4d0;
            background-image: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, transparent 60%), url('parchment.png');
            background-size: cover;
            background-position: center;
            border: 3px solid #5d4037;
            box-shadow: 2px 4px 6px rgba(0,0,0,0.6);
            transition: transform 0.2s, box-shadow 0.2s, width 0.3s, height 0.3s;
            position: relative;
            user-select: none;
            color: #000;
            overflow: hidden; /* For image tokens */
        }

        .token.size-1 { width: 75px; height: 75px; }
        .token.size-2 { width: 155px; height: 155px; }
        .token.size-3 { width: 235px; height: 235px; }
        .token.size-4 { width: 315px; height: 315px; }

        .token.with-img {
            background-image: none; /* Reset parchment background */
            background-color: #fff;
        }

        .token img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .token:active {
            cursor: grabbing;
        }

        .token:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 6px 8px 12px rgba(0,0,0,0.7);
        }

        .token.on-map {
            position: absolute;
            z-index: 10;
        }

        .token.selected {
            outline: 3px solid #ffeb3b;
            box-shadow: 0 0 15px #ffeb3b, 0 0 25px rgba(255,235,59,0.5);
            z-index: 100 !important;
        }

        .token[data-border="green"] { border: 3px solid #4caf50; }
        .token[data-border="red"] { border: 3px solid #f44336; }
        .token[data-border="default"] { border: 2px solid rgba(255,255,255,0.4); }

        /* Main Area */
        main {
            flex: 1;
            overflow: auto;
            background-color: #222; /* Darker neutral background */
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center; /* Center the map */
            align-items: flex-start;
            padding: 40px;
        }

        #map-container {
            position: relative;
            width: calc(var(--cell-size) * var(--grid-cols));
            height: calc(var(--cell-size) * var(--grid-rows));
            background-color: #f4e4bc;
            background-image: url('parchment.png');
            background-size: cover;
            border: 2px solid #5d4037;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            flex-shrink: 0; /* Don't shrink */
        }

        #grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.3) 2px, transparent 2px),
                linear-gradient(to bottom, rgba(0,0,0,0.3) 2px, transparent 2px);
            background-size: var(--cell-size) var(--cell-size);
            pointer-events: none;
            z-index: 1;
        }

        #drawing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2; /* Under tokens by default */
            pointer-events: none;
        }

        /* Top level when actually drawing */
        body.drawing-mode #drawing-canvas {
            z-index: 15;
            pointer-events: auto;
        }

        #drop-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: auto;
        }

        /* When drawing, make tokens and drop-zone click-through */
        body.drawing-mode #drop-zone,
        body.drawing-mode .token {
            pointer-events: none !important;
        }

        .token.on-map {
            position: absolute;
            z-index: 10;
            cursor: grab;
            pointer-events: auto;
        }

        /* Controls */
        .token-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--accent-color);
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .token-controls.visible {
            display: flex;
        }

        .btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 8px 15px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #f1c40f;
        }

        .btn.danger {
            background: #c62828;
            color: white;
        }

        .btn.danger:hover {
            background: #e53935;
        }

        .border-btns {
            display: flex;
            gap: 5px;
        }

        .color-dot {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .color-dot.green { background: #2e7d32; }
        .color-dot.red { background: #c62828; }
        .color-dot.default { background: #555; }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
        }

        .hint {
            position: absolute;
            bottom: 10px;
            left: 320px;
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <aside>
        <header>
            <h1>Dragonbane Battle Map</h1>
            <div class="search-container">
                <input type="text" id="token-search" placeholder="Buscar ficha (ej: Orc, Dwarf)..." oninput="filterTokens()">
            </div>
            <div class="drawing-tools">
                <button class="tool-btn" id="btn-draw" onclick="setTool('pen')">✏️ Pintar</button>
                <button class="tool-btn" id="btn-erase" onclick="setTool('eraser')">🧽 Borrar</button>
                <input type="color" id="marker-color" value="#000000" title="Color del rotulador">
                <button class="tool-btn" onclick="clearCanvas()">🗑️ Limpiar Todo</button>
            </div>
        </header>
        <div class="sidebar-content">
            <!-- Héroes -->
            <div class="category" id="cat-heroes">
                <div class="category-title" onclick="toggleCategory('cat-heroes')">
                    <span>Personajes Jugadores (PJ)</span>
                    <span class="icon">▼</span>
                </div>
                <div class="category-items">
                </div>
            </div>

            <!-- Monstruos -->
            <div class="category" id="cat-monsters">
                <div class="category-title" onclick="toggleCategory('cat-monsters')">
                    <span>Personajes No Jugadores (PNJ)</span>
                    <span class="icon">▼</span>
                </div>
                <div class="category-items">
                </div>
            </div>

            <!-- Categorías Dinámicas (Veteranos, Orcos, etc) -->
            <div id="dynamic-categories"></div>

            <!-- Escenario -->
            <div class="category" id="cat-props">
                <div class="category-title" onclick="toggleCategory('cat-props')">
                    <span>Objetos y Escenario</span>
                    <span class="icon">▼</span>
                </div>
                <div class="category-items">
                </div>
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="map-selector">
                <label style="display: flex; align-items: center; gap: 5px; font-size: 0.7rem; cursor: pointer; margin-bottom: 10px;">
                    <input type="checkbox" checked onchange="toggleGrid(this.checked)"> Mostrar Cuadrícula Digital
                </label>
                <label style="font-size: 0.8rem; color: var(--accent-color); text-transform: uppercase;">Tipo de Terreno:</label>
                <select onchange="changeTerrain(this.value)" style="background: #333; color: white; border: 1px solid var(--accent-color); padding: 5px; font-family: inherit; border-radius: 4px; margin-bottom: 10px;">
                    <option value="parchment.png">Pergamino Antiguo</option>
                    <option value="stone.png">Suelo de Piedra (Mazmorra)</option>
                    <option value="wood_dark.png">Madera Oscura (Taberna)</option>
                    <option value="forest_green">Verde Bosque</option>
                    <option value="white">Blanco Limpio</option>
                </select>
            </div>
            <button class="btn" onclick="document.getElementById('local-upload').click()">Añadir Ilustraciones Locales</button>
            <input type="file" id="local-upload" multiple accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
            <button class="btn danger" style="width: 100%;" onclick="clearBoard()">Limpiar Tablero</button>
        </div>
    </aside>

    <main>
        <div id="map-container">
            <h2 style="position: absolute; top: 10px; left: 20px; color: rgba(0,0,0,0.4); font-size: 1.2rem; pointer-events: none;">Mapa de Batalla</h2>
            <div id="grid-overlay"></div>
            <canvas id="drawing-canvas"></canvas>
            <div id="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)">
                <!-- Tokens will appear here -->
            </div>
        </div>
    </main>

    <div class="hint">Arrastra fichas al mapa. Haz clic para seleccionar. Doble clic para borrar.</div>

    <div id="token-controls" class="token-controls">
        <h3>Propiedades</h3>
        <p>Borde de la ficha:</p>
        <div class="border-btns">
            <div class="color-dot default" onclick="changeBorder('default')"></div>
            <div class="color-dot green" onclick="changeBorder('green')"></div>
            <div class="color-dot red" onclick="changeBorder('red')"></div>
        </div>
        <button class="btn danger" onclick="deleteSelectedToken()">Eliminar Ficha</button>
        <button class="btn" onclick="deselectToken()">Cerrar</button>
    </div>

    <script src="assets-list.js"></script>
    <script>
        const cell_size = 80;
        let selectedToken = null;
        let draggedElement = null;

        // --- Assets Management ---
        function initAssets() {
            const dynamicContainer = document.getElementById('dynamic-categories');
            const heroesContainer = document.querySelector('#cat-heroes .category-items');
            const monstersContainer = document.querySelector('#cat-monsters .category-items');
            const propsContainer = document.querySelector('#cat-props .category-items');
            
            if (typeof illustrationAssets === 'undefined') return;

            // Clear containers
            if (heroesContainer) heroesContainer.innerHTML = '';
            if (monstersContainer) monstersContainer.innerHTML = '';
            if (propsContainer) propsContainer.innerHTML = '';
            if (dynamicContainer) dynamicContainer.innerHTML = '';

            const heroPrefixes = ["elven", "human", "halfling", "mallard", "wolfkin", "dwarf", "berserk"];
            const heroClasses = ["Artificer", "Barbarian", "Bard", "Cleric", "Druid", "Fighter", "Monk", "Paladin", "Ranger", "Rogue", "Sorcerer", "Warlock", "Wizard"];

            illustrationAssets.forEach(asset => {
                const lowerAsset = asset.toLowerCase();
                const nameBase = asset.split('.')[0];
                
                // 1. Props
                if (lowerAsset.startsWith("prop")) {
                    if (propsContainer) addTokenToContainer(propsContainer, asset, "prop");
                    return;
                }

                // 2. Heroes (PJs)
                const isHeroClass = heroClasses.some(hClass => nameBase.includes(hClass));
                const isHeroPrefix = heroPrefixes.some(prefix => lowerAsset.startsWith(prefix));
                
                if (isHeroClass || isHeroPrefix) {
                    if (heroesContainer) addTokenToContainer(heroesContainer, asset, "hero");
                    return;
                }

                // 3. Monsters (PNJs)
                if (monstersContainer) addTokenToContainer(monstersContainer, asset, "monster");
            });
        }

        function addTokenToContainer(container, asset, type) {
            const lowerAsset = asset.toLowerCase();
            let size = 1;
            if (lowerAsset.includes("garg")) size = 4;
            else if (lowerAsset.includes("huge")) size = 3;
            else if (lowerAsset.includes("large")) size = 2;
            
            const nameClean = asset.replace(/\(.*?\)/g, "").replace(".webp", "").replace(".png", "").replace(/_/g, " ").trim();
            
            const token = document.createElement('div');
            token.className = 'token with-img';
            token.draggable = true;
            token.dataset.type = type;
            token.dataset.img = `Ilustraciones/${asset}`;
            token.dataset.size = size;
            token.title = nameClean;
            token.innerHTML = `<img src="Ilustraciones/${asset}" alt="${nameClean}" loading="lazy">`;
            token.addEventListener('dragstart', drag);
            
            container.appendChild(token);
        }

        function filterTokens() {
            const query = document.getElementById('token-search').value.toLowerCase();
            const tokens = document.querySelectorAll('aside .token');
            const categories = document.querySelectorAll('.category');

            tokens.forEach(token => {
                const title = (token.title || "").toLowerCase();
                const icon = (token.dataset.icon || "").toLowerCase();
                if (title.includes(query) || icon.includes(query)) {
                    token.style.display = 'flex';
                } else {
                    token.style.display = 'none';
                }
            });

            // Expand categories that have results
            if (query.length > 0) {
                categories.forEach(cat => {
                    const hasVisible = cat.querySelectorAll('.token[style="display: flex;"]').length > 0;
                    if (hasVisible) {
                        cat.classList.remove('collapsed');
                        cat.querySelector('.icon').innerText = '▼';
                    } else {
                        cat.classList.add('collapsed');
                        cat.querySelector('.icon').innerText = '►';
                    }
                });
            }
        }

        function handleFileUpload(event) {
            const files = event.target.files;
            const container = document.getElementById('cat-heroes').querySelector('.category-items'); // Add to heroes by default
            
            for (const file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const token = document.createElement('div');
                    token.className = 'token with-img';
                    token.draggable = true;
                    token.dataset.type = "hero";
                    token.dataset.img = e.target.result;
                    token.dataset.size = 1;
                    token.title = file.name;
                    token.innerHTML = `<img src="${e.target.result}" alt="${file.name}">`;
                    token.addEventListener('dragstart', drag);
                    container.prepend(token); // Add to the top
                };
                reader.readAsDataURL(file);
            }
        }

        function changeMapBg(value) {
            document.getElementById('map-container').style.backgroundImage = `url('parchment.png')`;
        }

        function toggleGrid(visible) {
            document.getElementById('grid-overlay').style.display = visible ? 'block' : 'none';
        }

        function changeTerrain(value) {
            const container = document.getElementById('map-container');
            const grid = document.getElementById('grid-overlay');
            
            // Grosor de la línea solicitado
            const lineWidth = '2px';
            
            if (value === 'white') {
                container.style.backgroundImage = 'none';
                container.style.backgroundColor = '#ffffff';
                grid.style.backgroundImage = `linear-gradient(to right, rgba(0,0,0,0.2) ${lineWidth}, transparent ${lineWidth}), linear-gradient(to bottom, rgba(0,0,0,0.2) ${lineWidth}, transparent ${lineWidth})`;
            } else if (value === 'forest_green') {
                container.style.backgroundImage = 'none';
                container.style.backgroundColor = '#1a5d1a'; // Verde Bosque profundo
                grid.style.backgroundImage = `linear-gradient(to right, rgba(255,255,255,0.2) ${lineWidth}, transparent ${lineWidth}), linear-gradient(to bottom, rgba(255,255,255,0.2) ${lineWidth}, transparent ${lineWidth})`;
            } else {
                container.style.backgroundImage = `url('${value}')`;
                container.style.backgroundColor = 'transparent';
                
                // Ajustar color de cuadrícula según el fondo
                if (value === 'wood_dark.png' || value === 'stone.png') {
                    grid.style.backgroundImage = `linear-gradient(to right, rgba(255,255,255,0.25) ${lineWidth}, transparent ${lineWidth}), linear-gradient(to bottom, rgba(255,255,255,0.25) ${lineWidth}, transparent ${lineWidth})`;
                } else {
                    grid.style.backgroundImage = `linear-gradient(to right, rgba(0,0,0,0.3) ${lineWidth}, transparent ${lineWidth}), linear-gradient(to bottom, rgba(0,0,0,0.3) ${lineWidth}, transparent ${lineWidth})`;
                }
            }
        }

        // --- Drawing System ---
        let currentTool = 'none';
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');

        function setupCanvas() {
            const container = document.getElementById('map-container');
            if (!container) return;
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 4;
        }

        function setTool(tool) {
            if (currentTool === tool) {
                currentTool = 'none';
            } else {
                currentTool = tool;
                setupCanvas();
            }

            const isAnyTool = currentTool !== 'none';
            canvas.classList.toggle('active', isAnyTool);
            document.body.classList.toggle('drawing-mode', isAnyTool);
            document.getElementById('btn-draw').classList.toggle('active', currentTool === 'pen');
            document.getElementById('btn-erase').classList.toggle('active', currentTool === 'eraser');
            
            const handleStart = (e) => {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                lastX = touch.clientX - rect.left;
                lastY = touch.clientY - rect.top;
                if (e.touches) e.preventDefault();
            };

            const handleMove = (e) => {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;

                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);

                if (currentTool === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = 30;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = document.getElementById('marker-color').value;
                }

                ctx.stroke();
                lastX = x;
                lastY = y;
                if (e.touches) e.preventDefault();
            };

            const handleEnd = () => isDrawing = false;

            canvas.onmousedown = isAnyTool ? handleStart : null;
            canvas.onmousemove = isAnyTool ? handleMove : null;
            canvas.onmouseup = isAnyTool ? handleEnd : null;
            canvas.onmouseleave = isAnyTool ? handleEnd : null;

            // Touch events
            canvas.ontouchstart = isAnyTool ? handleStart : null;
            canvas.ontouchmove = isAnyTool ? handleMove : null;
            canvas.ontouchend = isAnyTool ? handleEnd : null;
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        window.addEventListener('resize', setupCanvas);
        setTimeout(setupCanvas, 1000);

        // --- Existing Logic ---
        function toggleCategory(id) {
            const cat = document.getElementById(id);
            cat.classList.toggle('collapsed');
            const icon = cat.querySelector('.icon');
            icon.innerText = cat.classList.contains('collapsed') ? '►' : '▼';
        }

        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev) {
            draggedElement = ev.target.closest('.token');
            if (draggedElement.dataset.img) {
                ev.dataTransfer.setData("img", draggedElement.dataset.img);
            }
            ev.dataTransfer.setData("text", draggedElement.dataset.icon || "");
            ev.dataTransfer.setData("type", draggedElement.dataset.type);
            ev.dataTransfer.setData("size", draggedElement.dataset.size || "1");
        }

        function drop(ev) {
            ev.preventDefault();
            const icon = ev.dataTransfer.getData("text");
            const imgUrl = ev.dataTransfer.getData("img");
            const type = ev.dataTransfer.getData("type");
            const size = parseInt(ev.dataTransfer.getData("size") || "1");
            
            const dropZone = document.getElementById('drop-zone');
            const rect = dropZone.getBoundingClientRect();
            let x = ev.clientX - rect.left;
            let y = ev.clientY - rect.top;

            // Snap to Grid Logic
            const snapX = Math.floor(x / cell_size) * cell_size;
            const snapY = Math.floor(y / cell_size) * cell_size;
            
            // Center the token slightly within the cell group
            const tokenDim = size * cell_size - 4;
            const finalX = snapX + (cell_size * size - tokenDim) / 2;
            const finalY = snapY + (cell_size * size - tokenDim) / 2;

            if (draggedElement && draggedElement.classList.contains('on-map')) {
                draggedElement.style.left = finalX + 'px';
                draggedElement.style.top = finalY + 'px';
            } else if (imgUrl || icon) {
                createNewToken(icon, type, finalX, finalY, imgUrl, size);
            }
            draggedElement = null;
        }

        function createNewToken(icon, type, x, y, imgUrl = null, size = 1) {
            const token = document.createElement('div');
            token.className = `token on-map size-${size}${imgUrl ? ' with-img' : ''}`;
            
            if (imgUrl) {
                const img = document.createElement('img');
                img.src = imgUrl;
                token.appendChild(img);
                token.dataset.img = imgUrl;
            } else {
                token.innerText = icon;
                token.dataset.icon = icon;
            }

            token.style.left = x + 'px';
            token.style.top = y + 'px';
            token.draggable = true;
            token.dataset.border = "default";
            token.dataset.type = type;
            token.dataset.size = size;
            
            // Mouse Drag
            token.addEventListener('dragstart', (e) => {
                draggedElement = token;
                if (imgUrl) e.dataTransfer.setData("img", imgUrl);
                e.dataTransfer.setData("text", icon || "");
                e.dataTransfer.setData("size", size);
            });

            // Touch Drag Simulation (simplified for iPad)
            token.ontouchstart = (e) => {
                if (currentTool !== 'none') return;
                draggedElement = token;
                selectToken(token);
            };
            token.ontouchmove = (e) => {
                if (currentTool !== 'none' || !draggedElement) return;
                const touch = e.touches[0];
                const rect = document.getElementById('drop-zone').getBoundingClientRect();
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                
                // Real-time preview (optional)
                token.style.left = (x - (cell_size * size)/2) + 'px';
                token.style.top = (y - (cell_size * size)/2) + 'px';
                e.preventDefault();
            };
            token.ontouchend = (e) => {
                if (currentTool !== 'none' || !draggedElement) return;
                const touch = e.changedTouches[0];
                const dropZone = document.getElementById('drop-zone');
                const rect = dropZone.getBoundingClientRect();
                
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;

                // Snap
                const snapX = Math.floor(x / cell_size) * cell_size;
                const snapY = Math.floor(y / cell_size) * cell_size;
                const tokenDim = size * cell_size - 4;
                
                token.style.left = (snapX + (cell_size * size - tokenDim) / 2) + 'px';
                token.style.top = (snapY + (cell_size * size - tokenDim) / 2) + 'px';
                
                draggedElement = null;
            };

            token.addEventListener('click', (e) => {
                e.stopPropagation();
                selectToken(token);
            });

            token.addEventListener('dblclick', (e) => {
                token.remove();
                if (selectedToken === token) deselectToken();
            });

            document.getElementById('drop-zone').appendChild(token);
            selectToken(token);
        }

        function selectToken(token) {
            if (selectedToken) {
                selectedToken.classList.remove('selected');
            }
            selectedToken = token;
            selectedToken.classList.add('selected');
            document.getElementById('token-controls').classList.add('visible');
        }

        function deselectToken() {
            if (selectedToken) {
                selectedToken.classList.remove('selected');
                selectedToken = null;
            }
            document.getElementById('token-controls').classList.remove('visible');
        }

        function changeBorder(color) {
            if (selectedToken) {
                selectedToken.dataset.border = color;
            }
        }

        function deleteSelectedToken() {
            if (selectedToken) {
                selectedToken.remove();
                deselectToken();
            }
        }

        function clearBoard() {
            if (confirm("¿Seguro que quieres limpiar todo el tablero?")) {
                const zone = document.getElementById('drop-zone');
                zone.innerHTML = '';
                deselectToken();
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.token') && !e.target.closest('.token-controls')) {
                deselectToken();
            }
        });

        // Initialize dynamic tokens
        initAssets();
    </script>
    <script>
        // Registro del Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado'))
                    .catch(err => console.log('Error al registrar SW:', err));
            });
        }
    </script>
</body>
</html>
